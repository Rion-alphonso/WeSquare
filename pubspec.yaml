name: bgmi_tournament
description: WeSquare - Premier Esports Tournament Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^13.1.0

  # Networking
  dio: ^5.4.0

  # Models / Serialization
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

  # Local Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2

  # UI
  google_fonts: ^6.1.0
  shimmer: ^3.0.0
  confetti: ^0.7.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9

  # Image (TODO: re-add image_picker/image_cropper when web-compatible)
  # image_picker: ^1.0.7
  # image_cropper: ^5.0.1

  # Notifications (TODO: re-add when firebase web plugins support Flutter 3.41)
  # firebase_core: ^2.24.2
  # firebase_messaging: ^14.7.9

  # Utilities
  intl: ^0.19.0
  uuid: ^4.2.1
  url_launcher: ^6.2.2
  path_provider: ^2.1.2
  # connectivity_plus: ^5.0.2  # dart:html incompatible with Flutter 3.41
  percent_indicator: ^4.2.3
  fl_chart: ^0.66.2

  # Cupertino
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  freezed: ^2.4.5
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9
  mockito: ^5.4.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  # Fonts loaded dynamically via google_fonts package
  # To use local fonts, place font files in assets/fonts/ and uncomment below:
  # fonts:
  #   - family: Poppins
  #     fonts:
  #       - asset: assets/fonts/Poppins-Regular.ttf
  #       - asset: assets/fonts/Poppins-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/Poppins-SemiBold.ttf
  #         weight: 600
  #       - asset: assets/fonts/Poppins-Bold.ttf
  #         weight: 700

